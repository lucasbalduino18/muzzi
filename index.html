<!DOCTYPE html>

<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Minhas Despesas</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💰</text></svg>">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet" media="print" onload="this.media='all'">
    <noscript><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet"></noscript>
    <style>
    /* ============================================
       DESIGN SYSTEM — COCKPIT NIGHT MODE
       Palette: deep navy base, teal accent, amber alert
    ============================================ */
    :root {
        --bg:          #080D1A;
        --surface:     #0F1729;
        --surface-2:   #162035;
        --surface-3:   #1E2A3A;
        --border:      rgba(255,255,255,0.07);
        --border-2:    rgba(255,255,255,0.12);
        --teal:        #00D4AA;
        --teal-dim:    rgba(0,212,170,0.12);
        --teal-mid:    rgba(0,212,170,0.25);
        --amber:       #F59E0B;
        --amber-dim:   rgba(245,158,11,0.15);
        --red:         #EF4444;
        --red-dim:     rgba(239,68,68,0.15);
        --green:       #22C55E;
        --green-dim:   rgba(34,197,94,0.12);
        --purple:      #8B5CF6;
        --text-1:      #F0F4FF;
        --text-2:      #94A3B8;
        --text-3:      #4E627A;
        --radius-sm:   8px;
        --radius-md:   12px;
        --radius-lg:   16px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
        font-family: 'Inter', -apple-system, sans-serif;
        background: var(--bg);
        color: var(--text-1);
        min-height: 100vh;
        padding: 20px;
        padding-bottom: 100px;
        /* Subtle grid texture */
        background-image:
            linear-gradient(rgba(0,212,170,0.015) 1px, transparent 1px),
            linear-gradient(90deg, rgba(0,212,170,0.015) 1px, transparent 1px);
        background-size: 40px 40px;
    }

    .container { max-width: 500px; margin: 0 auto; }

    h1 {
        font-size: 1.5rem;
        font-weight: 700;
        letter-spacing: 0.04em;
        text-transform: uppercase;
        color: var(--text-1);
        margin-bottom: 24px;
    }

    /* ── CARDS ─────────────────────────────── */
    .card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius-lg);
        padding: 20px;
        margin-bottom: 16px;
        position: relative;
        overflow: hidden;
    }
    /* Teal left-edge accent on cards */
    .card::before {
        content: '';
        position: absolute;
        left: 0; top: 12px; bottom: 12px;
        width: 3px;
        background: var(--teal);
        border-radius: 0 3px 3px 0;
        opacity: 0.6;
    }

    .balance {
        text-align: center;
        font-size: 2.6rem;
        font-weight: 700;
        margin: 16px 0;
        font-variant-numeric: tabular-nums;
        color: var(--text-1);
        letter-spacing: -0.01em;
    }

    .meta {
        display: flex;
        justify-content: space-around;
        margin-top: 16px;
        padding-top: 16px;
        border-top: 1px solid var(--border);
    }
    .meta-item { text-align: center; }
    .meta-label { font-size: 0.75rem; color: var(--text-2); margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.06em; }
    .meta-value { font-size: 1.2rem; font-weight: 700; font-variant-numeric: tabular-nums; }

    /* ── TABS ─────────────────────────────── */
    .tabs {
        display: flex;
        gap: 4px;
        margin-bottom: 20px;
        overflow-x: auto;
        overflow-y: hidden;
        -webkit-overflow-scrolling: touch;
        scrollbar-width: none;
        -ms-overflow-style: none;
        padding-bottom: 4px;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius-md);
        padding: 4px;
    }
    .tabs::-webkit-scrollbar { display: none; }

    .tab {
        flex: 1;
        min-width: fit-content;
        padding: 9px 8px;
        background: transparent;
        border: none;
        border-radius: var(--radius-sm);
        color: var(--text-2);
        font-weight: 600;
        cursor: pointer;
        transition: all 0.2s;
        font-size: 0.65rem;
        white-space: nowrap;
        letter-spacing: 0.03em;
        text-transform: uppercase;
    }
    .tab:hover { color: var(--text-1); background: var(--surface-3); }
    .tab.active {
        background: var(--teal);
        color: #080D1A;
        font-weight: 700;
    }

    /* ── INPUTS ───────────────────────────── */
    .input-group { margin-bottom: 14px; }
    .label {
        display: block;
        margin-bottom: 7px;
        font-weight: 600;
        font-size: 0.8rem;
        color: var(--text-2);
        text-transform: uppercase;
        letter-spacing: 0.06em;
    }
    input, textarea, select {
        width: 100%;
        padding: 11px 14px;
        background: var(--surface-2);
        border: 1px solid var(--border-2);
        border-radius: var(--radius-sm);
        font-size: 0.95rem;
        color: var(--text-1);
        font-family: inherit;
        transition: border-color 0.2s;
    }
    input:focus, textarea:focus, select:focus {
        outline: none;
        border-color: var(--teal);
        background: var(--surface-3);
    }
    input[type="date"], input[type="time"] { color-scheme: dark; }
    input[type="date"]::-webkit-calendar-picker-indicator,
    input[type="time"]::-webkit-calendar-picker-indicator { filter: invert(0.6); }

    textarea { min-height: 90px; resize: vertical; }

    select option { background: var(--surface-2); color: var(--text-1); }

    /* ── BUTTONS ─────────────────────────── */
    .btn {
        width: 100%;
        padding: 13px;
        background: var(--teal);
        border: none;
        border-radius: var(--radius-sm);
        color: #080D1A;
        font-size: 0.9rem;
        font-weight: 700;
        cursor: pointer;
        margin-top: 10px;
        letter-spacing: 0.04em;
        text-transform: uppercase;
        transition: all 0.2s;
    }
    .btn:hover { background: #00E8BB; }
    .btn:active { transform: scale(0.98); }
    .btn:disabled { opacity: 0.35; cursor: not-allowed; }
    .btn-secondary {
        background: var(--surface-3);
        color: var(--text-1);
        border: 1px solid var(--border-2);
    }
    .btn-secondary:hover { background: var(--surface-2); }

    /* ── CATEGORY GRID ───────────────────── */
    .category-grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 8px;
        margin-top: 10px;
    }
    .category-option {
        background: var(--surface-2);
        padding: 12px 8px;
        border-radius: var(--radius-sm);
        border: 1px solid var(--border);
        cursor: pointer;
        transition: all 0.2s;
        text-align: center;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 6px;
    }
    .category-option:hover { background: var(--surface-3); border-color: var(--border-2); }
    .category-option:active { transform: scale(0.96); }
    .category-option.selected {
        background: var(--teal-dim);
        border-color: var(--teal);
    }
    .category-icon { font-size: 1.6rem; }
    .category-name { font-size: 0.7rem; font-weight: 600; color: var(--text-2); }
    .category-option.selected .category-name { color: var(--teal); }

    /* ── EXPENSE LIST ─────────────────────── */
    .expense-item {
        background: var(--surface-2);
        border: 1px solid var(--border);
        border-radius: var(--radius-sm);
        padding: 12px 14px;
        margin-bottom: 8px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        transition: border-color 0.2s;
    }
    .expense-item:hover { border-color: var(--border-2); }
    .expense-info { flex: 1; }
    .expense-merchant { font-weight: 600; margin-bottom: 3px; font-size: 0.95rem; }
    .expense-date { font-size: 0.78rem; color: var(--text-2); }
    .expense-category {
        display: inline-block;
        padding: 3px 8px;
        border-radius: 4px;
        font-size: 0.7rem;
        font-weight: 600;
        margin-top: 4px;
        opacity: 0.85;
    }
    .expense-amount {
        font-size: 1.1rem;
        font-weight: 700;
        font-variant-numeric: tabular-nums;
        color: var(--text-1);
    }
    .delete-btn {
        background: var(--red-dim);
        border: 1px solid rgba(239,68,68,0.2);
        color: var(--red);
        padding: 7px 10px;
        border-radius: var(--radius-sm);
        margin-left: 8px;
        cursor: pointer;
        font-size: 0.8rem;
        transition: all 0.2s;
    }
    .delete-btn:hover { background: rgba(239,68,68,0.25); }
    .edit-btn {
        background: rgba(59,130,246,0.12);
        border: 1px solid rgba(59,130,246,0.2);
        color: #60A5FA;
        padding: 7px 10px;
        border-radius: var(--radius-sm);
        margin-left: 8px;
        cursor: pointer;
        font-size: 0.8rem;
        transition: all 0.2s;
    }
    .edit-btn:hover { background: rgba(59,130,246,0.22); }

    /* ── PROGRESS BARS ────────────────────── */
    .progress-bar {
        width: 100%;
        height: 6px;
        background: var(--surface-3);
        border-radius: 3px;
        overflow: hidden;
        margin: 12px 0;
    }
    .progress-fill {
        height: 100%;
        background: var(--teal);
        border-radius: 3px;
        transition: width 0.5s;
    }
    .progress-fill.warning { background: var(--amber); }
    .progress-fill.danger { background: var(--red); }

    /* ── STATS GRID ──────────────────────── */
    .empty { text-align: center; padding: 40px; color: var(--text-3); }
    .stats { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 16px; }
    .stat-card {
        background: var(--surface-2);
        border: 1px solid var(--border);
        padding: 14px;
        border-radius: var(--radius-sm);
        text-align: center;
    }
    .stat-label { font-size: 0.72rem; color: var(--text-2); margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.06em; }
    .stat-value { font-size: 1.3rem; font-weight: 700; font-variant-numeric: tabular-nums; }

    /* ── MONTH HISTORY ────────────────────── */
    .month-group { margin-bottom: 20px; }
    .month-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 11px 16px;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius-sm);
        font-weight: 700;
        font-size: 0.95rem;
        margin-bottom: 8px;
        cursor: pointer;
        transition: all 0.2s;
    }
    .month-header:hover { border-color: var(--teal); background: var(--surface-2); }
    .month-header:active { transform: scale(0.99); }
    .month-toggle { font-size: 1rem; transition: transform 0.3s; color: var(--text-2); }
    .month-toggle.expanded { transform: rotate(180deg); }
    .month-expenses { max-height: 0; overflow: hidden; transition: max-height 0.3s ease-out; }
    .month-expenses.expanded { max-height: 600px; overflow-y: auto; overflow-x: hidden; }
    .expand-controls { display: flex; gap: 8px; margin-bottom: 14px; }
    .expand-controls button {
        flex: 1;
        padding: 9px;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius-sm);
        color: var(--text-2);
        font-size: 0.8rem;
        cursor: pointer;
        transition: all 0.2s;
        letter-spacing: 0.03em;
    }
    .expand-controls button:hover { border-color: var(--teal); color: var(--teal); }

    /* ── RITMO / GAUGE ────────────────────── */
    .ritmo-card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius-lg);
        padding: 20px;
        margin-bottom: 16px;
        position: relative;
        overflow: hidden;
    }
    .ritmo-card::before {
        content: '';
        position: absolute;
        left: 0; top: 12px; bottom: 12px;
        width: 3px;
        background: var(--amber);
        border-radius: 0 3px 3px 0;
        opacity: 0.7;
    }
    .ritmo-header { text-align: center; margin-bottom: 16px; }
    .ritmo-title { font-size: 0.8rem; color: var(--text-2); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.07em; }
    .ritmo-gauge { position: relative; width: 100%; margin: 12px 0 8px 0; }
    .ritmo-bar {
        position: relative;
        width: 100%;
        height: 24px;
        background: var(--surface-3);
        border-radius: 4px;
        overflow: hidden;
        border: 1px solid var(--border);
    }
    .ritmo-fill {
        height: 100%;
        border-radius: 4px;
        transition: width 0.5s, background-color 0.5s;
        display: flex;
        align-items: center;
        justify-content: flex-end;
        padding-right: 10px;
        font-weight: 700;
        font-size: 0.8rem;
        color: #080D1A;
    }
    .ritmo-markers {
        position: relative;
        margin-top: 6px;
        font-size: 0.68rem;
        color: var(--text-3);
        height: 14px;
    }
    .ritmo-markers span { position: absolute; transform: translateX(-50%); }
    .ritmo-markers span:nth-child(1) { left: 0%; }
    .ritmo-markers span:nth-child(2) { left: 53.33%; }
    .ritmo-markers span:nth-child(3) { left: 66.67%; }
    .ritmo-markers span:nth-child(4) { left: 80%; }
    .ritmo-markers span:nth-child(5) { left: 100%; transform: translateX(-100%); }
    .ritmo-status { text-align: center; margin-top: 10px; }
    .ritmo-status-emoji { font-size: 2rem; margin-bottom: 4px; }
    .ritmo-status-text { font-size: 1.1rem; font-weight: 700; margin-bottom: 4px; }
    .ritmo-status-desc { font-size: 0.82rem; color: var(--text-2); }
    .ritmo-details { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 16px; }
    .ritmo-detail-item {
        background: var(--surface-2);
        border: 1px solid var(--border);
        padding: 10px 12px;
        border-radius: var(--radius-sm);
    }
    .ritmo-detail-label { font-size: 0.7rem; color: var(--text-2); margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.05em; }
    .ritmo-detail-value { font-size: 1rem; font-weight: 700; font-variant-numeric: tabular-nums; }

    /* ── GAUGE SVG ────────────────────────── */
    .gauge-container { display: flex; justify-content: center; align-items: center; margin: 16px 0; }
    .gauge { position: relative; width: 180px; height: 180px; }
    .gauge-circle { transform: rotate(-90deg); }
    .gauge-bg { fill: none; stroke: var(--surface-3); stroke-width: 10; }
    .gauge-fill { fill: none; stroke-width: 10; stroke-linecap: round; transition: stroke-dashoffset 0.6s ease; }
    .gauge-fill.low { stroke: var(--teal); }
    .gauge-fill.medium { stroke: var(--amber); }
    .gauge-fill.high { stroke: var(--red); }
    .gauge-text { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; }
    .gauge-percent { font-size: 2.2rem; font-weight: 700; line-height: 1; font-variant-numeric: tabular-nums; }
    .gauge-label { font-size: 0.78rem; color: var(--text-2); margin-top: 4px; text-transform: uppercase; letter-spacing: 0.05em; }
    .gauge-info { display: flex; justify-content: space-around; margin-top: 12px; padding: 12px; background: var(--surface-2); border: 1px solid var(--border); border-radius: var(--radius-sm); }
    .gauge-info-item { text-align: center; }
    .gauge-info-label { font-size: 0.7rem; color: var(--text-2); margin-bottom: 3px; text-transform: uppercase; letter-spacing: 0.05em; }
    .gauge-info-value { font-size: 1rem; font-weight: 700; font-variant-numeric: tabular-nums; }

    /* ── LOADING ──────────────────────────── */
    .loading {
        position: fixed; top: 0; left: 0; right: 0; bottom: 0;
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        background: var(--bg); z-index: 9998; gap: 28px;
    }
    .loading-logo {
        font-size: 3rem; animation: loadingPulse 1.5s ease-in-out infinite;
    }
    .loading-spinner {
        width: 48px; height: 48px;
        border: 3px solid rgba(0,212,170,0.15);
        border-top: 3px solid #00D4AA;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
    }
    .loading-text {
        font-size: 0.8rem; color: var(--text-3); letter-spacing: 0.12em;
        text-transform: uppercase; animation: loadingFade 1.5s ease-in-out infinite;
    }
    .loading-bars {
        display: flex; gap: 5px; align-items: flex-end; height: 24px;
    }
    .loading-bar {
        width: 4px; background: #00D4AA; border-radius: 2px;
        animation: loadingBar 1s ease-in-out infinite;
    }
    .loading-bar:nth-child(1) { animation-delay: 0s;    height: 8px; }
    .loading-bar:nth-child(2) { animation-delay: 0.15s; height: 16px; }
    .loading-bar:nth-child(3) { animation-delay: 0.3s;  height: 24px; }
    .loading-bar:nth-child(4) { animation-delay: 0.15s; height: 16px; }
    .loading-bar:nth-child(5) { animation-delay: 0s;    height: 8px; }
    @keyframes loadingBar {
        0%, 100% { opacity: 0.3; transform: scaleY(0.6); }
        50%       { opacity: 1;   transform: scaleY(1); }
    }
    @keyframes loadingPulse {
        0%, 100% { transform: scale(1);    opacity: 0.8; }
        50%       { transform: scale(1.12); opacity: 1; }
    }
    @keyframes loadingFade {
        0%, 100% { opacity: 0.4; }
        50%       { opacity: 0.9; }
    }

    /* ── CATEGORY LIST ────────────────────── */
    .category-list { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 12px; }
    .category-item {
        background: var(--surface-2);
        padding: 10px;
        border-radius: var(--radius-sm);
        text-align: center;
        cursor: pointer;
        transition: all 0.2s;
        border: 1px solid var(--border);
    }
    .category-item.selected { border-color: var(--teal); background: var(--teal-dim); }
    .category-item:active { transform: scale(0.96); }
    .category-icon { font-size: 1.6rem; margin-bottom: 4px; }
    .category-name { font-size: 0.78rem; font-weight: 600; color: var(--text-2); }
    .category-item.selected .category-name { color: var(--teal); }

    /* ── CATEGORY CHART ──────────────────── */
    .category-chart { margin-top: 16px; }
    .category-bar { margin-bottom: 12px; cursor: pointer; transition: 0.2s; padding: 8px; border-radius: var(--radius-sm); }
    .category-bar:hover { background: var(--surface-2); transform: translateX(4px); }
    .category-bar:active { transform: scale(0.99); }
    .category-bar-header { display: flex; justify-content: space-between; margin-bottom: 5px; font-size: 0.88rem; }
    .category-bar-fill { height: 6px; background: var(--surface-3); border-radius: 3px; overflow: hidden; }
    .category-bar-progress { height: 100%; border-radius: 3px; transition: width 0.5s; }

    /* ── MODAL ────────────────────────────── */
    .modal {
        position: fixed; top: 0; left: 0; right: 0; bottom: 0;
        background: rgba(0,0,0,0.75);
        display: flex; align-items: center; justify-content: center;
        z-index: 1000; padding: 20px;
        backdrop-filter: blur(4px);
    }
    .modal-content {
        background: var(--surface);
        border: 1px solid var(--border-2);
        border-radius: var(--radius-lg);
        padding: 24px;
        max-width: 500px; width: 100%;
        max-height: 90vh; overflow-y: auto;
    }
    .modal-header { font-size: 1.2rem; font-weight: 700; margin-bottom: 18px; text-align: center; }
    .modal-buttons { display: flex; gap: 10px; margin-top: 18px; }
    .modal-buttons .btn { flex: 1; }

    /* ── SCROLLBAR ────────────────────────── */
    .month-expenses.expanded::-webkit-scrollbar { width: 4px; }
    .month-expenses.expanded::-webkit-scrollbar-track { background: transparent; }
    .month-expenses.expanded::-webkit-scrollbar-thumb { background: var(--border-2); border-radius: 4px; }
    .month-expenses.expanded::-webkit-scrollbar-thumb:hover { background: var(--text-3); }

    /* ── ANIMATIONS ───────────────────────── */
    @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
</style>

<body>
    <!-- Inline loading overlay — shown immediately, removed by render() -->
    <div id="loadingOverlay" class="loading">
        <div class="loading-logo">💰</div>
        <div class="loading-bars">
            <div class="loading-bar"></div>
            <div class="loading-bar"></div>
            <div class="loading-bar"></div>
            <div class="loading-bar"></div>
            <div class="loading-bar"></div>
        </div>
        <div class="loading-text">Loading...</div>
    </div>
    <div class="container">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <h1 id="appTitle" style="margin: 0; opacity: 0; transition: opacity 0.15s ease;">💰 Minhas Despesas</h1>
            <div style="display: flex; gap: 8px; align-items: center;">
                <button onclick="openSettings()" title="Configurações" style="
                    background: rgba(255,255,255,0.04);
                    border: 1px solid rgba(255,255,255,0.1);
                    color: #94A3B8;
                    width: 36px;
                    height: 36px;
                    border-radius: 8px;
                    font-size: 16px;

    function t(key) {
        const lang = (typeof state !== 'undefined' && state && state.lang) ? state.lang : 'pt';

    }

    // Locales recomendados por moeda
    const CURRENCY_LOCALES = { AED: 'en-AE', BRL: 'pt-BR', USD: 'en-US', EUR: 'de-DE', GBP: 'en-GB', CHF: 'de-CH', CAD: 'en-CA', AUD: 'en-AU', JPY: 'ja-JP', CNY: 'zh-CN' };

    function getCurrencyLocale() {
        return CURRENCY_LOCALES[state.currency] || 'en-US';
    }

    function formatAED(value) {
        try {
            return new Intl.NumberFormat(getCurrencyLocale(), {
                style: 'currency',
                currency: state.currency || 'AED',
                minimumFractionDigits: 2,
                maximumFractionDigits: 2
            }).format(value);
        } catch(e) {
            return (state.currency || 'AED') + ' ' + parseFloat(value).toFixed(2);
        }
    }

    function formatAEDShort(value) {
        try {
            return new Intl.NumberFormat(getCurrencyLocale(), {
                style: 'currency',
                currency: state.currency || 'AED',
                minimumFractionDigits: 0,
                maximumFractionDigits: 0
            }).format(value);
        } catch(e) {
            return (state.currency || 'AED') + ' ' + parseFloat(value).toFixed(0);
        }
    }
    
    // Normalizar mês para formato consistente (1/2026, não 01/2026)
    function normalizeMonth(monthYear) {
        if (!monthYear || typeof monthYear !== 'string') return monthYear;
        const parts = monthYear.split('/');
        if (parts.length !== 2) return monthYear;
        const month = parseInt(parts[0]);
        const year = parseInt(parts[1]);
        if (isNaN(month) || isNaN(year)) return monthYear;
        return `${month}/${year}`;
    }

    // Função para formatar apenas números (sem AED) - para página Adicionar
    function formatNumberShort(value) {
        return new Intl.NumberFormat('en-AE', {
            minimumFractionDigits: 0,
            maximumFractionDigits: 0
        }).format(value);
    }

    // Carregar dados do Google Sheets
    // ============================================
    // CACHE SYSTEM
    // ============================================
    const CACHE_KEY = 'despesas_app_cache';
    const CACHE_DURATION = 10 * 60 * 1000; // 10 minutos (mutations atualizam o cache localmente)

    function saveCache(data) {
        try {
            const cache = {
                data,
                timestamp: Date.now()
            };
            sessionStorage.setItem(CACHE_KEY, JSON.stringify(cache));
        } catch (e) {
        }
    }

    function loadCache() {
        try {
            const cached = sessionStorage.getItem(CACHE_KEY);
            if (!cached) return null;
            
            const cache = JSON.parse(cached);
            const age = Date.now() - cache.timestamp;
            
            if (age < CACHE_DURATION) {
                return cache.data;
            }
            sessionStorage.removeItem(CACHE_KEY);
            return null;
        } catch (e) {
            return null;
        }
    }

    function clearAppCache() {
        try {
            sessionStorage.removeItem(CACHE_KEY);
        } catch (e) {
        }
    }
    
    function updateCache() {
        try {
            saveCache({
                expenses: state.expenses,
                fixedExpenses: state.fixedExpenses,
                monthlyFixedExpenses: state.monthlyFixedExpenses,
                goal: state.goal,
                goalFixed: state.goalFixed,
                yearlyGoal: state.yearlyGoal,
                currency: state.currency,
                lang: state.lang,
                monthlyIncome: state.monthlyIncome
            });
        } catch (e) {
        }
    }

    // ============================================
    // LOAD DATA (OTIMIZADO)
    // ============================================
    async function loadData(forceRefresh = false) {
        const wasLoading = state.loading;
        
        // Tentar cache primeiro (se não for force refresh)
        if (!forceRefresh) {
            const cached = loadCache();
            if (cached) {
                
                state.expenses = cached.expenses || [];
                state.goal = cached.goal || 5000;
                state.goalFixed = cached.goalFixed || 0;
                state.yearlyGoal = cached.yearlyGoal || 0;
                state.currency = cached.currency || 'AED';
                state.lang = cached.lang || 'pt';
                state.fixedExpenses = cached.fixedExpenses || [];
                
                // Filtrar fixas mensais inválidas do cache
                const cleanedFixed = {};
                Object.keys(cached.monthlyFixedExpenses || {}).forEach(month => {
                    if (month && 
                        !month.includes('undefined') && 
                        !month.includes('NaN') && 
                        month !== '0/0' &&
                        month.includes('/')) {
                        cleanedFixed[month] = cached.monthlyFixedExpenses[month];
                    }
                });
                state.monthlyFixedExpenses = cleanedFixed;
                
                state.monthlyIncome = cached.monthlyIncome || {};
                state.loading = false;

                // Aplicar idioma do cache imediatamente, antes do render
                const titleElCache = document.getElementById('appTitle');
                if (titleElCache) {
                    titleElCache.innerHTML = '💰 ' + t('appTitle');
                    titleElCache.style.opacity = '1';
                }
                document.title = t('appTitle');
                
                if (wasLoading) {
                    render();
                }
                return;
            }
        }
        
        // Função auxiliar: fetch com retry automático
        // No carregamento inicial: 2 tentativas, 600ms — favorece velocidade
        // Em actualizações forçadas: 3 tentativas, 1000ms — favorece fiabilidade
        async function fetchWithRetry(url, retries = forceRefresh ? 3 : 2, delayMs = forceRefresh ? 1000 : 600) {
            for (let attempt = 1; attempt <= retries; attempt++) {
                try {
                    // Timeout de 8s — evita ficar pendurado em 4G
                    const controller = new AbortController();
                    const timer = setTimeout(() => controller.abort(), 8000);
                    const response = await fetch(url, { signal: controller.signal });
                    clearTimeout(timer);
                    const data = await response.json();
                    return { ok: true, data };
                } catch (err) {
                    if (attempt < retries) await new Promise(r => setTimeout(r, delayMs * attempt));
                }
            }
            return { ok: false, data: null };
        }

        try {

            // ── Fase 1: Despesas (maior payload — primeiro) ──────────────
            const despesasRes = await fetchWithRetry(`${SHEETS_URL}?action=getDespesas`);
            if (despesasRes.ok) {
                const d = despesasRes.data;
                state.expenses = d.expenses || d || [];
            } else {
                console.error('❌ Despesas falharam após retries');
                state.expenses = state.expenses || [];
            }

            // ── Fase 2: Meta + Fixas + Rendimentos em paralelo ──────────
            // Agora com menos pressão no servidor (despesas já terminaram)
            const [metaRes, fixedRes, incomeRes, monthlyFixedRes] = await Promise.all([
                fetchWithRetry(`${SHEETS_URL}?action=getMeta`),
                fetchWithRetry(`${SHEETS_URL}?action=getFixedExpenses`),
                fetchWithRetry(`${SHEETS_URL}?action=getIncome`),
                fetchWithRetry(`${SHEETS_URL}?action=getAllMonthlyFixed`)
            ]);

            // Processar meta
            if (metaRes.ok) {
                const m = metaRes.data;
                state.goal       = (m.meta       != null && m.meta       !== '') ? Number(m.meta)       : (state.goal       || 5000);
                state.goalFixed  = (m.metaFixed  != null && m.metaFixed  !== '') ? Number(m.metaFixed)  : (state.goalFixed  || 0);
                state.yearlyGoal = (m.yearlyGoal != null && m.yearlyGoal !== '') ? Number(m.yearlyGoal) : (state.yearlyGoal || 0);
                if (m.currency && m.currency.trim().length >= 2) state.currency = m.currency.trim().toUpperCase();
                if (m.lang && (m.lang === 'pt' || m.lang === 'en')) state.lang = m.lang;
            } else {
                console.error('❌ Meta falhou após retries — mantendo valores actuais');
            }

            // Processar fixas
            if (fixedRes.ok) {
                state.fixedExpenses = fixedRes.data.fixedExpenses || [];
            } else {
                console.error('❌ Fixas falharam após retries — mantendo valores actuais');
                state.fixedExpenses = state.fixedExpenses || [];
            }

            // Processar rendimentos
            if (incomeRes.ok) {
                state.monthlyIncome = incomeRes.data.income || {};
            } else {
                console.error('❌ Rendimentos falharam após retries — mantendo valores actuais');
                state.monthlyIncome = state.monthlyIncome || {};
            }

            // Processar fixas mensais
            if (monthlyFixedRes.ok && monthlyFixedRes.data.success) {
                const cleanedFixed = {};
                Object.keys(monthlyFixedRes.data.monthlyFixed || {}).forEach(month => {
                    if (month && !month.includes('undefined') && !month.includes('NaN') &&
                        month !== '0/0' && month.includes('/')) {
                        cleanedFixed[month] = monthlyFixedRes.data.monthlyFixed[month];
                    }
                });
                state.monthlyFixedExpenses = cleanedFixed;
            } else {
                console.error('❌ Fixas mensais falharam após retries — mantendo valores actuais');
                state.monthlyFixedExpenses = state.monthlyFixedExpenses || {};
            }

            // Salvar cache
            saveCache({
                expenses: state.expenses,
                fixedExpenses: state.fixedExpenses,
                monthlyFixedExpenses: state.monthlyFixedExpenses,
                goal: state.goal,
                goalFixed: state.goalFixed,
                yearlyGoal: state.yearlyGoal,
                currency: state.currency,
                lang: state.lang,
                monthlyIncome: state.monthlyIncome
            });

            state.loading = false;
            if (wasLoading) render();

        } catch (error) {
            console.error('Erro ao carregar dados:', error);
            state.loading = false;
            if (wasLoading) render();
        }
    }


    // ============================================

    async function refreshData() {
        const btn = event.target;
        const originalText = btn.innerHTML;
        
        // Animação de loading
        btn.innerHTML = '⏳';
        btn.style.animation = 'spin 1s linear infinite';
        btn.disabled = true;
        
        // Force refresh (ignora cache)
        await loadData(true);
        
        // IMPORTANTE: Atualizar a tela!
        render();
        
        // Restaura botão
        btn.innerHTML = '✓';
        btn.style.animation = '';
        btn.disabled = false;
        
        // Volta ao ícone original
        setTimeout(() => {
            btn.innerHTML = originalText;
        }, 1000);
    }

    async function downloadBackup() {
        showToast(t('backupPreparando'));

        const now = new Date();
        const dd = String(now.getDate()).padStart(2,'0');
        const mm = String(now.getMonth()+1).padStart(2,'0');
        const yyyy = now.getFullYear();
        const filename = `despesas_backup_${dd}-${mm}-${yyyy}.xlsx`;

        // Carregar SheetJS dinamicamente
        await new Promise((resolve, reject) => {
            if (window.XLSX) { resolve(); return; }
            const s = document.createElement('script');
            s.src = 'https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js';
            s.onload = resolve;
            s.onerror = reject;
            document.head.appendChild(s);
        });

        const wb = XLSX.utils.book_new();

        // ── Aba 1: Despesas ──────────────────────────────────────────────
        // Estrutura idêntica à planilha: ID, Valor, Data, Hora, Estabelecimento, Categoria, Observação
        const despesasRows = [['ID', 'Valor', 'Data', 'Hora', 'Estabelecimento', 'Categoria', 'Observação']];
        (state.expenses || []).forEach(e => {
            despesasRows.push([
                e.id || '',
                parseFloat(e.amount) || 0,
                e.date || '',
                e.time || '',
                e.merchant || '',
                e.category || '',
                e.obs || ''
            ]);
        });
        const wsDespesas = XLSX.utils.aoa_to_sheet(despesasRows);
        wsDespesas['!cols'] = [14,10,12,10,30,14,20].map(w => ({ wch: w }));
        XLSX.utils.book_append_sheet(wb, wsDespesas, 'Despesas');

        // ── Aba 2: FixasPorMes ───────────────────────────────────────────
        // Estrutura: Mês + todas as despesas fixas desse mês
        const fixasPorMesRows = [['Mês', 'Nome', 'Valor', 'Categoria']];
        Object.entries(state.monthlyFixedExpenses || {})
            .sort(([a], [b]) => {
                const [ma, ya] = a.split('/').map(Number);
                const [mb, yb] = b.split('/').map(Number);
                return ya !== yb ? yb - ya : mb - ma;
            })
            .forEach(([month, fixas]) => {
                (fixas || []).forEach(f => {
                    fixasPorMesRows.push([
                        month,
                        f.name || '',
                        parseFloat(f.amount) || 0,
                        f.category || ''
                    ]);
                });
            });
        const wsFixasPorMes = XLSX.utils.aoa_to_sheet(fixasPorMesRows);
        wsFixasPorMes['!cols'] = [12,30,10,14].map(w => ({ wch: w }));
        XLSX.utils.book_append_sheet(wb, wsFixasPorMes, 'FixasPorMes');

        // ── Aba 3: Rendimentos ───────────────────────────────────────────
        // Estrutura: Mês, Valor — ordenado mais recente primeiro
        const rendRows = [['Mês', 'Valor']];
        Object.entries(state.monthlyIncome || {})
            .sort(([a], [b]) => {
                const [ma, ya] = a.split('/').map(Number);
                const [mb, yb] = b.split('/').map(Number);
                return ya !== yb ? yb - ya : mb - ma;
            })
            .forEach(([month, value]) => {
                rendRows.push([month, parseFloat(value) || 0]);
            });
        const wsRend = XLSX.utils.aoa_to_sheet(rendRows);
        wsRend['!cols'] = [12, 14].map(w => ({ wch: w }));
        XLSX.utils.book_append_sheet(wb, wsRend, 'Rendimentos');

        // ── Aba 4: Fixas ─────────────────────────────────────────────────
        // Estrutura idêntica à planilha: Nome, Valor, Dia, Categoria
        const fixasRows = [['Nome', 'Valor', 'Dia', 'Categoria']];
        (state.fixedExpenses || []).forEach(f => {
            fixasRows.push([f.name || '', parseFloat(f.amount) || 0, f.day || '', f.category || '']);
        });
        const wsFixas = XLSX.utils.aoa_to_sheet(fixasRows);
        wsFixas['!cols'] = [30,10,8,14].map(w => ({ wch: w }));
        XLSX.utils.book_append_sheet(wb, wsFixas, 'Fixas');

        const metaRows = [

        wsMeta['!cols'] = [18, 14].map(w => ({ wch: w }));
        XLSX.utils.book_append_sheet(wb, wsMeta, 'Meta');

        // Download
        XLSX.writeFile(wb, filename);

    }

        state.lang = lang;

        // Guardar na planilha via setMeta
        try {

            if (result.success) {

    async function updateCurrency(value) {
        const cur = value.trim().toUpperCase();
        if (!cur || cur.length < 2 || cur.length > 4) {
            showToast('❌ Moeda inválida. Use ex: AED, BRL, USD', 'error');
            return false;
        }
        state.currency = cur;
        updateCache();
        render();

        // Guardar na planilha via setMeta
        try {
            const url = `${SHEETS_URL}?action=setMeta&goal=${state.goal}&goalFixed=${state.goalFixed}&yearlyGoal=${state.yearlyGoal}&currency=${encodeURIComponent(cur)}&lang=${encodeURIComponent(state.lang || 'pt')}`;
            const response = await fetch(url);
            const result = await response.json();
            if (result.success) {
                showToast(`✅ Moeda alterada para ${cur}`);
            } else {
                showToast(`✅ Moeda alterada para ${cur} (cache local)`);
            }
        } catch (e) {
            showToast(`✅ Moeda alterada para ${cur} (cache local)`);
        }
        return true;
    }

    // Utilitário: converte DD/MM/YYYY → YYYY-MM-DD
    function dateToISO(dateStr) {
        if (!dateStr) return '';
        const p = dateStr.split('/');
        if (p.length < 3) return '';
        return p[2] + '-' + p[1].padStart(2,'0') + '-' + p[0].padStart(2,'0');
    }

    // Verifica se uma despesa está dentro do período filtrado
    function inDateRange(e) {
        const eDate = dateToISO(e.date);
        if (!eDate) return false;
        const afterStart = !state.histDateStart || eDate >= state.histDateStart;
        const beforeEnd  = !state.histDateEnd   || eDate <= state.histDateEnd;
        return afterStart && beforeEnd;
    }

    // Renderiza lista de despesas respeitando o filtro (usado dentro dos meses colapsados)
    function renderFilteredExpenses(expenses) {
        const visibleExpenses = (state.histDateStart || state.histDateEnd)
            ? expenses.filter(inDateRange)
            : expenses;

        return visibleExpenses.map(e => {
            const amount   = parseFloat(e.amount) || 0;
            const merchant = e.merchant || 'Sem nome';
            const date     = e.date || '';
            const time     = e.time || '';
            const category = e.category || 'outros';
            const obs      = e.obs || '';
            const cur      = state.currency || 'AED';

            return '<div class="expense-item">' +
                '<div class="expense-info">' +
                    '<div class="expense-merchant">' + merchant + '</div>' +
                    '<div class="expense-date">' + date + ' ' + t('as') + ' ' + time + '</div>' +
                    (obs ? '<div class="expense-date" style="font-style: italic; margin-top: 4px;">💬 ' + obs + '</div>' : '') +
                    '<span class="expense-category" style="background: ' + getCategoryColor(category) + '">' + getCategoryIcon(category) + ' ' + getCategoryName(category) + '</span>' +
                '</div>' +
                '<div style="display:flex; align-items:center;">' +
                    '<div class="expense-amount">' + cur + ' ' + amount.toFixed(2) + '</div>' +
                    '<button class="edit-btn" data-action="edit" data-id="' + e.id + '">✏️</button>' +
                    '<button class="delete-btn" data-action="delete" data-id="' + e.id + '">🗑️</button>' +
                '</div>' +
            '</div>';
        }).join('');
    }

    // Resumo do período + lista flat de despesas filtradas
    function renderPeriodSummary(months, expensesByMonth) {
        if (!state.histDateStart && !state.histDateEnd) return '';

        // Recolher todas as despesas do período, ordenadas por data desc
        const allFiltered = [];
        months.forEach(monthYear => {
            (expensesByMonth[monthYear] || []).forEach(e => {
                if (inDateRange(e)) allFiltered.push(e);
            });
        });
        allFiltered.sort((a, b) => {
            const da = dateToISO(a.date) + (a.time || '');
            const db = dateToISO(b.date) + (b.time || '');
            return db.localeCompare(da);
        });

        if (allFiltered.length === 0) {
            return '<div style="text-align:center; padding: 20px; color: var(--text-3); font-size: 0.9rem;">Nenhuma despesa neste período</div>';
        }

        const periodVariavel = allFiltered.reduce((sum, e) => sum + (parseFloat(e.amount)||0), 0);
        const numDays = state.histDateStart && state.histDateEnd
            ? Math.round((new Date(state.histDateEnd) - new Date(state.histDateStart)) / 86400000) + 1
            : null;
        const cur = state.currency || 'AED';

        // ── Resumo: só variáveis ──────────────────────────────────────────
        let html = '<div style="background: var(--surface); border: 1px solid rgba(0,212,170,0.2); border-radius: var(--radius-lg); padding: 16px; margin-bottom: 16px; border-left: 3px solid var(--teal);">';
        const periodLabel = numDays !== null
            ? (numDays + ' ' + (numDays === 1 ? 'dia' : 'dias'))
            : '';
        html += '<div style="font-size: 0.72rem; color: var(--teal); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 14px;">📊 Resumo — ' + (periodLabel ? periodLabel + ' · ' : '') + allFiltered.length + ' despesas</div>';

        // Card único: total variáveis
        html += '<div style="background: var(--surface-2); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 14px; display: flex; justify-content: space-between; align-items: center;">';
        html += '<div>';
        html += '<div style="font-size: 0.7rem; color: var(--text-2); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 4px;">💸 Total Variáveis</div>';
        html += (numDays ? '<div style="font-size: 0.7rem; color: var(--text-3);">Média ' + formatAED(periodVariavel/numDays) + '/dia</div>' : '');
        html += '</div>';
        html += '<div style="font-size: 1.4rem; font-weight: 700; color: #ef4444; font-variant-numeric: tabular-nums;">' + formatAED(periodVariavel) + '</div>';
        html += '</div>';
        html += '</div>';

        // ── Lista flat de despesas filtradas ──────────────────────────────
        html += '<div style="margin-bottom: 16px;">';
        allFiltered.forEach(e => {
            const amount   = parseFloat(e.amount) || 0;
            const merchant = e.merchant || 'Sem nome';
            const date     = e.date || '';
            const time     = e.time || '';
            const category = e.category || 'outros';
            const obs      = e.obs || '';

            html += '<div class="expense-item">' +
                '<div class="expense-info">' +
                    '<div class="expense-merchant">' + merchant + '</div>' +
                    '<div class="expense-date">' + date + ' ' + t('as') + ' ' + time + '</div>' +
                    (obs ? '<div class="expense-date" style="font-style: italic; margin-top: 4px;">💬 ' + obs + '</div>' : '') +
                    '<span class="expense-category" style="background: ' + getCategoryColor(category) + '">' + getCategoryIcon(category) + ' ' + getCategoryName(category) + '</span>' +
                '</div>' +
                '<div style="display:flex; align-items:center;">' +
                    '<div class="expense-amount">' + cur + ' ' + amount.toFixed(2) + '</div>' +
                    '<button class="edit-btn" data-action="edit" data-id="' + e.id + '">✏️</button>' +
                    '<button class="delete-btn" data-action="delete" data-id="' + e.id + '">🗑️</button>' +
                '</div>' +
            '</div>';
        });
        html += '</div>';

        return html;
    }

    function parseSMS(text) {
        // Helpers para data/hora atual (usados quando o SMS não tem data)
        function todayDate() {
            const d = new Date();
            return String(d.getDate()).padStart(2,'0') + '/' +
                   String(d.getMonth()+1).padStart(2,'0') + '/' +
                   d.getFullYear();
        }
        function nowTime() {
            const d = new Date();
            return String(d.getHours()).padStart(2,'0') + ':' +
                   String(d.getMinutes()).padStart(2,'0') + ':' +
                   String(d.getSeconds()).padStart(2,'0');
        }

        // Detectar moeda no texto do SMS
        function detectCurrency(text) {
            const m = text.match(/\b(AED|USD|EUR|GBP|BRL|CHF|CAD|AUD|JPY|CNY)\b/i);
            return m ? m[1].toUpperCase() : null;
        }

        // ── Padrão 1 (Lucas/Etihad): "Purchase of AED 355.00 with Credit Card ending 3783 at MIYABI SUSHI, DUBAI"
        // Sem data no SMS — usa data/hora actual
        const m1 = text.match(/Purchase\s+of\s+([A-Z]{3})\s*([\d,\.]+).*?at\s+([^,]+)/i);
        if (m1) {
            return {
                amount: parseFloat(m1[2].replace(/,/g, '')),
                smsCurrency: m1[1].toUpperCase(),
                date: todayDate(),
                time: nowTime(),
                merchant: m1[3].trim(),
                id: Date.now()
            };
        }

        // ── Padrão 2 (André/ADCB): "Your Cr.Card XXXXX was used for AED34.65 on 03/12/2025 16:20:26 at MERCHANT"
        // Tem data e hora no SMS
        const m2 = text.match(/(?:AED|aed|USD|EUR|GBP|BRL)\s*([\d,\.]+).*?on\s+([\d\/]+)\s+([\d:]+).*?at\s+([^,\.]+)/i);
        if (m2) {
            return {
                amount: parseFloat(m2[1].replace(/,/g, '')),
                smsCurrency: detectCurrency(text.substring(0, text.indexOf(m2[1]))) || 'AED',
                date: m2[2],
                time: m2[3],
                merchant: m2[4].trim(),
                id: Date.now()
            };
        }

        // ── Padrão 3: R$/USD/EUR com data e hora
        const m3 = text.match(/(R\$|USD|EUR|GBP|CHF)\s*([\d,\.]+).*?(\d{2}\/\d{2}\/\d{4}).*?(\d{2}:\d{2}:\d{2}).*?(?:at|em)\s+([^,\.]+)/i);
        if (m3) {
            const currMap = {'R$':'BRL','USD':'USD','EUR':'EUR','GBP':'GBP','CHF':'CHF'};
            return {
                amount: parseFloat(m3[2].replace(/,/g, '')),
                smsCurrency: currMap[m3[1].toUpperCase()] || m3[1].toUpperCase(),
                date: m3[3],
                time: m3[4],
                merchant: m3[5].trim(),
                id: Date.now()
            };
        }

        // ── Padrão 4: formato valor/data/estabelecimento genérico
        const m4 = text.match(/(?:valor|value|amount).*?([\d,\.]+).*?(?:data|date).*?(\d{2}\/\d{2}\/\d{4}).*?(\d{2}:\d{2}:\d{2}).*?(?:estabelecimento|merchant).*?([^\n]+)/i);
        if (m4) {
            return {
                amount: parseFloat(m4[1].replace(/,/g, '')),
                date: m4[2],
                time: m4[3],
                merchant: m4[4].trim(),
                id: Date.now()
            };
        }

        return null;
    }

    // Busca taxa de câmbio via open.er-api.com (gratuito, sem chave, CORS ok)
    async function fetchExchangeRate(from, to) {
        if (from === to) return 1;
        from = from.toUpperCase();
        to = to.toUpperCase();
        try {
            const res = await fetch(`https://open.er-api.com/v6/latest/${from}`);
            if (res.ok) {
                const data = await res.json();
                if (data.rates && data.rates[to]) return data.rates[to];
            }
        } catch(e) {}
        return null;
    }

    async function addExpense() {
        // Lock para evitar duplo envio
        if (state.saving) return;
        state.saving = true;

        // Capturar o SMS do campo antes de processar
        const smsInput = document.getElementById('smsInput');
        if (smsInput) { state.sms = smsInput.value; }

        const obsInput = document.getElementById('obsInput');
        if (obsInput) { state.obs = obsInput.value; }

        const parsed = parseSMS(state.sms);
        if (!parsed) {
            state.saving = false;
            alert(t('erroExtract'));
            return;
        }
        if (!state.selectedCategory) {
            state.saving = false;
            alert(t('erroCategoria'));
            return;
        }

        // ✅ ID único gerado no momento do clique
        parsed.id = String(Date.now());
        parsed.category = state.selectedCategory;
        parsed.obs = state.obs || '';

        // ── Conversão de moeda se o SMS usa moeda diferente ──────────────
        const smsCur = (parsed.smsCurrency || state.currency || 'AED').toUpperCase();
        const sysCur = (state.currency || 'AED').toUpperCase();
        if (smsCur !== sysCur) {
            const btnConv = document.querySelector('.btn-add-expense');
            if (btnConv) { btnConv.disabled = true; btnConv.textContent = '💱 ' + smsCur + '→' + sysCur + '...'; }
            const rate = await fetchExchangeRate(smsCur, sysCur);
            if (rate) {
                const originalAmount = parsed.amount;
                parsed.amount = Math.round(originalAmount * rate * 100) / 100;
                showToast('💱 ' + smsCur + ' ' + originalAmount.toFixed(2) + ' → ' + sysCur + ' ' + parsed.amount.toFixed(2) + ' (1 ' + smsCur + ' = ' + rate.toFixed(4) + ' ' + sysCur + ')');
            } else {
                // Fallback: ask user to enter amount manually
                showToast('⚠️ ' + smsCur + '→' + sysCur + ': taxa não disponível. Verifique o valor manualmente.', 'error');
            }
        }

        const btn = document.querySelector('.btn-add-expense');
        if (btn) { btn.disabled = true; btn.textContent = t('salvando'); }

        const success = await addExpenseToSheets(parsed);

        // Sempre reabilitar o botão e liberar o lock
        state.saving = false;
        if (btn) { btn.disabled = false; btn.textContent = t('extrairAdicionar'); }

        if (success) {
            // ✅ OTIMIZAÇÃO: Atualizar state localmente sem recarregar
            state.expenses.push(parsed);
            updateCache();
            state.sms = '';
            state.obs = '';
            state.selectedCategory = null;
            render();
            showToast(t('despesaSalva'));
        } else {
            showToast(t('erroSalvar'), 'error');
        }
    }

            const url = `${SHEETS_URL}?action=saveIncome&month=${encodeURIComponent(monthKey)}&value=${value}`;

    function getMonthExpenses(monthYear = null) {
        if (!state.expenses || !Array.isArray(state.expenses)) {
            console.warn('getMonthExpenses: state.expenses inválido', state.expenses);
            return [];
        }
        
        // Se não especificar mês, usa mês atual
        let targetMonth, targetYear;
        if (monthYear) {
            const parts = monthYear.split('/');
            targetMonth = parseInt(parts[0]) - 1;  // 0-indexed
            targetYear = parseInt(parts[1]);
        } else {
            const now = new Date();
            targetMonth = now.getMonth();
            targetYear = now.getFullYear();
        }
        
        return state.expenses.filter(e => {
            if (!e || !e.date) return false;
            
            const parts = e.date.toString().split('/');
            if (parts.length < 3) return false;
            
            const month = parseInt(parts[1]) - 1;
            const year = parseInt(parts[2]);
            return month === targetMonth && year === targetYear;
        });
    }

    async function addMonthlyFixedExpense() {
        const name = document.getElementById('fixedName').value.trim();

        if (!name || !amount || !day || !category) {
            alert(t('erroPreencha'));
            return;
        }
        
        // Prevenir duplicação - desabilitar botão
        const btn = document.getElementById('addFixedBtn');
        if (btn && btn.disabled) {
            return; // Já está processando
        }
        
        if (btn) {
            btn.disabled = true;
            btn.innerHTML = '⏳ ' + t('salvando');
            btn.style.opacity = '0.6';
        }
        
        const newFixed = {
            id: Date.now().toString(),
            name: name,
            amount: parseFloat(amount),
            day: parseInt(day),
            category: category
        };
        
        // Inicializar array se não existir
        if (!state.monthlyFixedExpenses[state.selectedFixedMonth]) {
            state.monthlyFixedExpenses[state.selectedFixedMonth] = [];
        }
        
        // Verificar se já existe (prevenir duplicação)
        const exists = state.monthlyFixedExpenses[state.selectedFixedMonth].find(
            f => f.name === name && f.amount === parseFloat(amount) && f.day === parseInt(day)
        );

            if (btn) {
                btn.disabled = false;
                btn.innerHTML = ('➕ ' + t('adicionarFixaMonthly').replace('➕ ',''));
                btn.style.opacity = '1';
            }
            return;
        }
        
        try {
            // Criar array temporário para salvar (state atual + nova)
            const updatedList = [...state.monthlyFixedExpenses[state.selectedFixedMonth], newFixed];
            
            // Salvar no servidor
            const success = await saveMonthlyFixedExpenses(
                state.selectedFixedMonth,
                updatedList
            );
            
            if (success) {
                
                // IMPORTANTE: Recarregar do servidor para garantir sincronização
                await loadMonthlyFixed(state.selectedFixedMonth);
                
                // Limpar formulário
                state.selectedCategory = null;
                document.getElementById('fixedName').value = '';
                document.getElementById('fixedAmount').value = '';
                document.getElementById('fixedDay').value = '';
            } else {
                throw new Error('Falha ao salvar');
            }
        } catch (error) {
            // Em caso de erro, não modifica o state
            console.error('❌ Erro ao adicionar:', error);
            alert('❌ Erro ao adicionar despesa fixa. Tente novamente.');
            if (btn) {
                btn.disabled = false;
                btn.innerHTML = ('➕ ' + t('adicionarFixaMonthly').replace('➕ ',''));

        const [currentMonthNum, currentYearNum] = state.selectedFixedMonth.split('/').map(Number);
        const previousMonthNum = currentMonthNum === 1 ? 12 : currentMonthNum - 1;
        const previousYearNum = currentMonthNum === 1 ? currentYearNum - 1 : currentYearNum;
        const previousMonth = `${previousMonthNum}/${previousYearNum}`;
        
        if (!state.monthlyFixedExpenses[previousMonth] || state.monthlyFixedExpenses[previousMonth].length === 0) {
            alert(t('erroMesAnterior'));
            return;

        if (state.monthlyFixedExpenses[state.selectedFixedMonth] && state.monthlyFixedExpenses[state.selectedFixedMonth].length > 0) {
            alert(t('erroJaPossui'));
            return;
        }
        
        if (!confirm(`Copiar ${state.monthlyFixedExpenses[previousMonth].length} despesas fixas do mês anterior?`)) {
            return;
        }
        
        // Copiar no servidor
        const success = await copyFixedFromPreviousMonth(previousMonth, state.selectedFixedMonth);
        
        if (success) {
            // Recarregar fixas do mês atual
            await loadMonthlyFixed(state.selectedFixedMonth);
            alert(t('fixaCopiada'));
        }
    }

    function getMonthDays() {
        const now = new Date();
        const currentDay = now.getDate();
        const lastDay = new Date(now.getFullYear(), now.getMonth() + 1, 0).getDate();
        const daysPassed = currentDay;
        const daysRemaining = lastDay - currentDay + 1; // Inclui o dia atual
        const isLastDay = currentDay === lastDay; // Verifica se é o último dia do mês
        
        return {
            passed: daysPassed,
            remaining: daysRemaining,
            total: lastDay,
            isLastDay: isLastDay
        };
    }

    function getRitmoGastos() {
        const monthExpenses = getMonthExpenses();
        const total = monthExpenses.reduce((sum, e) => sum + (parseFloat(e.amount) || 0), 0);
        const monthDays = getMonthDays();
        
        // Quanto poderia ter gastado até agora (proporcional aos dias)
        const poderiaGastar = (state.goal * monthDays.passed) / monthDays.total;
        
        // ${t('ritmoLabel')}: gasto real / poderia gastar * 100
        const ritmo = poderiaGastar > 0 ? (total / poderiaGastar * 100) : 0;
        
        // Determinar status e cor
        let status = '';
        let cor = '';
        let emoji = '';
        
        if (ritmo < 80) {
            status = t('excelente');
            cor = '#22c55e'; // Verde escuro
            emoji = '🟢';
        } else if (ritmo < 100) {
            status = t('bom');
            cor = '#84cc16'; // Verde claro
            emoji = '🟢';
        } else if (ritmo < 110) {
            status = t('atencao');
            cor = '#fbbf24'; // Amarelo
            emoji = '🟡';
        } else if (ritmo < 120) {
            status = t('cuidado');
            cor = '#fb923c'; // Laranja
            emoji = '🟠';
        } else {
            status = t('critico');
            cor = '#f87171'; // Vermelho suave
            emoji = '🔴';
        }
        
        return {
            ritmo: ritmo,
            status: status,
            cor: cor,
            emoji: emoji,
            gastoReal: total,
            poderiaGastar: poderiaGastar,
            diferenca: total - poderiaGastar,
            progressoMes: (monthDays.passed / monthDays.total * 100)
        };
    }
